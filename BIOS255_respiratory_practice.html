<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 6 — Respiratory System</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #1B2E4B;
    --highlight: #C9A84C;
    --bg: #0f0f13;
    --card: #1a1a22;
    --text: #f0f0f0;
    --muted: #888;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, #1B2E4B22 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, #C9A84C11 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 820px;
  }

  /* SPLASH */
  #splash {
    text-align: center;
    padding: 60px 20px;
    animation: fadeUp 0.6s ease both;
  }
  .splash-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--highlight);
    margin-bottom: 16px;
  }
  .splash-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(36px, 7vw, 72px);
    font-weight: 800;
    line-height: 1.0;
    color: #fff;
    margin-bottom: 12px;
  }
  .splash-title span { color: var(--highlight); }
  .splash-sub {
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 40px;
  }
  .splash-count {
    display: inline-block;
    background: var(--card);
    border: 1px solid #1B2E4B44;
    border-radius: 100px;
    padding: 8px 24px;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 40px;
  }
  .btn-start {
    display: inline-block;
    background: var(--highlight);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 18px 60px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 30px #C9A84C55;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 40px #C9A84C88; }

  /* QUIZ */
  #quiz { display: none; }
  .progress-bar-wrap {
    height: 4px;
    background: #ffffff15;
    border-radius: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--highlight));
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .q-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--highlight);
  }
  .q-score {
    font-size: 13px;
    color: var(--muted);
  }
  .q-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(20px, 3.5vw, 28px);
    font-weight: 600;
    line-height: 1.3;
    color: #fff;
    margin-bottom: 28px;
    min-height: 80px;
  }
  .answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .ans-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border: 2px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: #fff;
    text-align: left;
    transition: transform 0.1s, border-color 0.15s, background 0.15s;
    animation: fadeUp 0.4s ease both;
    line-height: 1.3;
  }
  .ans-btn:nth-child(1) { background: #E74C3C22; border-color: #E74C3C55; animation-delay: 0.05s; }
  .ans-btn:nth-child(2) { background: #2980B922; border-color: #2980B955; animation-delay: 0.1s; }
  .ans-btn:nth-child(3) { background: #F39C1222; border-color: #F39C1255; animation-delay: 0.15s; }
  .ans-btn:nth-child(4) { background: #27AE6022; border-color: #27AE6055; animation-delay: 0.2s; }
  .ans-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.2); }
  .ans-btn:disabled { cursor: default; }
  .ans-btn .badge {
    min-width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 15px;
    flex-shrink: 0;
  }
  .ans-btn:nth-child(1) .badge { background: #E74C3C; color: #fff; }
  .ans-btn:nth-child(2) .badge { background: #2980B9; color: #fff; }
  .ans-btn:nth-child(3) .badge { background: #F39C12; color: #fff; }
  .ans-btn:nth-child(4) .badge { background: #27AE60; color: #fff; }
  .ans-btn.correct { background: #27AE6044 !important; border-color: #27AE60 !important; }
  .ans-btn.wrong { background: #E74C3C33 !important; border-color: #E74C3C !important; opacity: 0.7; }
  .ans-btn.reveal { background: #27AE6022 !important; border-color: #27AE6088 !important; }

  .feedback {
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 20px;
    padding: 0 4px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .feedback.show { opacity: 1; }
  .feedback.correct-fb { color: #2ecc71; }
  .feedback.wrong-fb { color: #e74c3c; }

  .btn-next {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    display: none;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-next:hover { transform: translateY(-1px); opacity: 0.9; }

  /* RESULTS */
  #results {
    display: none;
    text-align: center;
    padding: 40px 20px;
    animation: fadeUp 0.6s ease both;
  }
  .results-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800;
    color: #fff;
    margin-bottom: 8px;
  }
  .score-big {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(64px, 14vw, 120px);
    font-weight: 800;
    color: var(--highlight);
    line-height: 1;
    margin: 20px 0;
    text-shadow: 0 0 60px #C9A84C66;
  }
  .score-label {
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 32px;
  }
  .results-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 36px;
  }
  .stat-box {
    background: var(--card);
    border: 1px solid #ffffff15;
    border-radius: 10px;
    padding: 20px 12px;
  }
  .stat-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: var(--highlight);
  }
  .stat-lbl {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }
  .btn-retry {
    display: inline-block;
    background: transparent;
    color: var(--highlight);
    border: 2px solid var(--highlight);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 16px 48px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    margin: 8px;
  }
  .btn-retry:hover { background: var(--highlight); color: #000; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 540px) {
    .answers { grid-template-columns: 1fr; }
    .results-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <div id="splash">
    <div class="splash-tag">BIOS 255 Practice</div>
    <div class="splash-title">Week 6 —<br><span> Respiratory System</span></div>
    <div class="splash-sub">BIOS 255 | Respiratory System Practice</div>
    <div class="splash-count">20 questions &nbsp;·&nbsp; 20 sec each &nbsp;·&nbsp; Multiple choice</div>
    <br>
    <button class="btn-start" onclick="startQuiz()">START</button>
  </div>

  <div id="quiz">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progBar" style="width:0%"></div></div>
    <div class="q-meta">
      <div class="q-num" id="qNum">Question 1 / 20</div>
      <div class="q-score" id="qScore">Score: 0</div>
    </div>
    <div class="q-text" id="qText"></div>
    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btnNext" onclick="nextQ()">Next →</button>
  </div>

  <div id="results">
    <div class="results-title">Quiz Complete</div>
    <div class="score-big" id="rScore"></div>
    <div class="score-label" id="rLabel"></div>
    <div class="results-grid">
      <div class="stat-box"><div class="stat-val" id="rCorrect"></div><div class="stat-lbl">Correct</div></div>
      <div class="stat-box"><div class="stat-val" id="rWrong"></div><div class="stat-lbl">Incorrect</div></div>
      <div class="stat-box"><div class="stat-val" id="rPct"></div><div class="stat-lbl">Accuracy</div></div>
    </div>
    <button class="btn-retry" onclick="retryAll()">Try Again</button>
    <button class="btn-retry" onclick="retryWrong()">Retry Missed</button>
  </div>

</div>
<script>
const ALL_Q = [{"q": "What is the PRIMARY purpose of turbulent airflow created by the nasal conchae?", "a": ["Slow air for olfactory detection", "Maximize contact with mucosa for warming/filtering", "Prevent objects from reaching nasopharynx", "Regulate volume of air per breath"], "c": 1}, {"q": "A patient has a tracheostomy. Which upper airway function is now BYPASSED?", "a": ["Olfaction", "Phonation", "Warming, humidifying, and filtering air", "Eustachian tube equalization"], "c": 2}, {"q": "Why does the oropharynx use stratified squamous epithelium instead of ciliated columnar?", "a": ["It needs more goblet cells for mucus", "It handles food/liquid and needs wear-resistant lining", "It must withstand higher airflow velocity", "It contains lymphoid tissue secreting IgA"], "c": 1}, {"q": "Which laryngeal structure closes during swallowing to prevent aspiration?", "a": ["Thyroid cartilage", "Cricoid cartilage", "Epiglottis", "Arytenoid cartilage"], "c": 2}, {"q": "Which is the ONLY complete cartilage ring in the entire airway?", "a": ["Thyroid cartilage", "Epiglottic cartilage", "Arytenoid cartilage", "Cricoid cartilage"], "c": 3}, {"q": "Why does the trachea have C-shaped rings with an open posterior side?", "a": ["To allow tracheal collapse during exhalation", "To permit the esophagus to expand during swallowing", "To attach the sternocleidomastoid muscle", "To allow phrenic nerve passage to diaphragm"], "c": 1}, {"q": "Which structure connects the larynx to the bronchi?", "a": ["Pharynx", "Trachea", "Bronchioles", "Nasal cavity"], "c": 1}, {"q": "Aspiration pneumonia preferentially affects which location due to airway anatomy?", "a": ["Left lung, lower lobe", "Right lung, upper lobe", "Right lung, lower lobe", "Left lung, lingula"], "c": 2}, {"q": "Which two cell types form the mucociliary escalator defense system?", "a": ["Type I alveolar cells and macrophages", "Ciliated columnar cells and goblet cells", "Endothelial cells and mast cells", "Clara cells and basal cells"], "c": 1}, {"q": "What structural change at the bronchiole level is central to asthma?", "a": ["Epithelium becomes squamous", "Cartilage disappears; smooth muscle dominates", "Goblet cells increase in density", "Airway diameter increases"], "c": 1}, {"q": "Which structure marks the START of the respiratory zone?", "a": ["Terminal bronchioles", "Segmental bronchi", "Respiratory bronchioles", "Alveolar ducts"], "c": 2}, {"q": "Respiratory bronchioles branch into which structure next?", "a": ["Terminal bronchioles", "Segmental bronchi", "Alveolar ducts", "Primary bronchi"], "c": 2}, {"q": "Which alveolar cell type is responsible for gas exchange (~95% surface area)?", "a": ["Type II alveolar cells", "Alveolar macrophages", "Type I (squamous) alveolar cells", "Goblet cells"], "c": 2}, {"q": "NRDS in premature infants results from insufficient function of which cell?", "a": ["Type I alveolar cells", "Alveolar macrophages", "Type II alveolar cells", "Endothelial cells"], "c": 2}, {"q": "Which alveolar cells are responsible for gas exchange?", "a": ["Type II alveolar cells", "Dust cells", "Type I alveolar cells", "Alveolar macrophages"], "c": 2}, {"q": "What is the PRIMARY site of gas exchange in the lungs?", "a": ["Bronchi", "Alveoli", "Trachea", "Pleura"], "c": 1}, {"q": "Loss of negative intrapleural pressure causes what condition?", "a": ["Diaphragm contracts more forcefully", "Barotrauma from excess airflow", "Lung collapses \u2014 pneumothorax", "Pleural fluid enters alveoli"], "c": 2}, {"q": "Which muscles are primarily responsible for quiet inspiration?", "a": ["Scalenes and sternocleidomastoid", "Internal intercostals and rectus abdominis", "Diaphragm and external intercostals", "Serratus anterior and pectoralis minor"], "c": 2}, {"q": "Applying Boyle's Law: when the diaphragm contracts, air flows IN because...", "a": ["Volume decreases \u2014 pressure rises \u2014 air flows in", "Volume increases \u2014 pressure drops \u2014 air flows from high to low", "Atmospheric pressure increases \u2014 air pushed in", "Diaphragm pulls air in via direct suction"], "c": 1}, {"q": "Which lung volume CANNOT be measured directly by spirometry?", "a": ["Tidal volume", "Inspiratory reserve volume", "Residual volume", "Expiratory reserve volume"], "c": 2}];
let questions = [], idx = 0, score = 0, wrong = [], answered = false;

function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

function startQuiz() {
  questions = shuffle([...ALL_Q]);
  idx = 0; score = 0; wrong = [];
  document.getElementById('splash').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  showQ();
}

function showQ() {
  answered = false;
  const q = questions[idx];
  const total = questions.length;
  document.getElementById('progBar').style.width = (idx / total * 100) + '%';
  document.getElementById('qNum').textContent = 'Question ' + (idx+1) + ' / ' + total;
  document.getElementById('qScore').textContent = 'Score: ' + score;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('btnNext').style.display = 'none';

  const labels = ['A', 'B', 'C', 'D'];
  const wrap = document.getElementById('answers');
  wrap.innerHTML = '';
  q.a.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.innerHTML = '<span class="badge">' + labels[i] + '</span><span>' + ans + '</span>';
    btn.onclick = () => pick(i, q.c);
    wrap.appendChild(btn);
  });
}

function pick(i, correct) {
  if (answered) return;
  answered = true;
  const btns = document.querySelectorAll('.ans-btn');
  const fb = document.getElementById('feedback');
  btns.forEach(b => b.disabled = true);

  if (i === correct) {
    score++;
    btns[i].classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = '✓ Correct!';
  } else {
    btns[i].classList.add('wrong');
    btns[correct].classList.add('reveal');
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = '✗ Incorrect — correct answer: ' + questions[idx].a[correct];
    wrong.push(questions[idx]);
  }
  document.getElementById('btnNext').style.display = 'block';
}

function nextQ() {
  idx++;
  if (idx < questions.length) { showQ(); }
  else { showResults(); }
}

function showResults() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  const total = questions.length;
  const pct = Math.round(score / total * 100);
  document.getElementById('rScore').textContent = pct + '%';
  document.getElementById('rLabel').textContent = score + ' of ' + total + ' correct';
  document.getElementById('rCorrect').textContent = score;
  document.getElementById('rWrong').textContent = total - score;
  document.getElementById('rPct').textContent = pct + '%';
}

function retryAll() { startQuiz(); }
function retryWrong() {
  if (wrong.length === 0) { retryAll(); return; }
  questions = shuffle([...wrong]);
  idx = 0; score = 0; wrong = [];
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  showQ();
}
</script>
</body>
</html>
