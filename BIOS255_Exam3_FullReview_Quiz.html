<style>

    --navy:#1B3A6B; --teal:#2E8B9A; --gold:#C9A84C;

  .option-btn.correct{border-color:var(--correct);background:var(--correct-bg);color:var(--correct);font-weight:600;}

  .option-btn.correct .letter{background:var(--correct);border-color:var(--correct);color:white;}

  .feedback{margin-top:1.25rem;padding:1rem 1.2rem;border-radius:8px;font-size:0.95rem;line-height:1.55;display:none;}
  .feedback.correct{background:var(--correct-bg);border-left:4px solid var(--correct);color:#1b4d1e;}
  .feedback.wrong{background:var(--wrong-bg);border-left:4px solid var(--wrong);color:#7a1515;}
  .feedback-label{font-weight:700;margin-bottom:0.3rem;}
  .nav-row{display:flex;justify-content:flex-end;margin-top:1.5rem;}
  .btn-next{background:var(--navy);color:white;border:none;padding:0.75rem 2rem;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;display:none;font-family:Calibri,'Segoe UI',Arial,sans-serif;transition:background 0.15s;}
  .btn-next:hover{background:var(--teal);}
  /* Results */
  .results{display:none;text-align:center;}

<script>
const questions = [
  // ── WEEK 5: IMMUNE SYSTEM ──
  {cat:"Wk5 · Three Lines of Defense", slide:"Slides 3–4",
   q:"Which line of defense is the FIRST to respond to a pathogen?",
   opts:["Adaptive immunity — B cells produce antibodies","External barriers — skin and mucous membranes","Complement system activation","T cell clonal expansion"],
   ans:1, exp:"The first line = external barriers: skin (keratin, acid mantle) and mucous membranes (mucus, cilia). These physical and chemical barriers prevent pathogens from entering the body at all. No prior exposure is needed — they are always active."},

  {cat:"Wk5 · Three Lines of Defense", slide:"Slides 3–4",
   q:"Which feature uniquely distinguishes adaptive immunity from innate immunity?",
   opts:["Faster response time — acts within minutes","Nonspecific — attacks any foreign material","Immunological memory — faster, stronger response on re-exposure","First line of physical defense"],
   ans:2, exp:"Immunological memory is the defining feature of adaptive immunity. After the first exposure, memory B and T cells remain. On re-exposure, the secondary response is faster and stronger — this is also the basis of vaccination."},

  {cat:"Wk5 · Second Line of Defense", slide:"Slide 8",
   q:"Interferons released by virally infected cells primarily function to:",
   opts:["Directly destroy the virus inside the secreting cell","Warn neighboring cells to upregulate antiviral defenses","Stimulate B cell antibody production","Activate the complement membrane attack complex"],
   ans:1, exp:"Interferons do NOT save the infected cell — they warn neighbors to prepare antiviral defenses and activate NK cells and macrophages. Interferon-alpha is used clinically to treat hepatitis C and certain cancers."},

  {cat:"Wk5 · Phagocytosis", slide:"Slide 15",
   q:"In phagocytosis, which step immediately follows phagosome formation?",
   opts:["Recognition and attachment","Engulfment via pseudopods","Fusion with lysosome to form phagolysosome","Migration to lymph node"],
   ans:2, exp:"Sequence: (1) Recognition/attachment → (2) Engulfment → (3) Phagosome formation → (4) Fusion with lysosome → (5) Antigen presentation → (6) Migration to lymph node. M. tuberculosis survives by preventing step 4 (lysosome fusion)."},

  {cat:"Wk5 · Second Line of Defense", slide:"Slide 7",
   q:"Which cell type is the KEY bridge between innate and adaptive immunity?",
   opts:["Neutrophils","NK natural killer cells","Dendritic cells / Langerhans cells","Eosinophils"],
   ans:2, exp:"Dendritic cells (APCs) phagocytize pathogens, display antigen fragments on MHC Class II, then migrate to lymph nodes to present antigen to naïve T cells. This handoff from innate to adaptive immunity is essential for a targeted response."},

  {cat:"Wk5 · Second Line of Defense", slide:"Slide 7",
   q:"Natural killer (NK) cells destroy infected or cancerous cells by:",
   opts:["Producing antibodies targeting the infected cell","Releasing perforins and granzymes to induce apoptosis","Activating the classical complement pathway","Presenting antigen fragments on MHC Class II"],
   ans:1, exp:"NK cells require NO prior antigen exposure. They kill cells with 'missing self' — cells that have downregulated MHC-I (cancer often does this). Perforins punch holes in the target cell membrane; granzymes enter and trigger apoptosis."},

  {cat:"Wk5 · MHC & Antigen Presentation", slide:"Slide 14",
   q:"MHC Class I molecules display antigens to which lymphocyte type?",
   opts:["CD4+ Helper T cells","B cells","CD8+ Cytotoxic T cells","Dendritic cells"],
   ans:2, exp:"MHC Class I is on ALL nucleated cells and displays what's happening INSIDE the cell. CD8+ cytotoxic T cells read this signal. If the cell is infected or cancerous → cytotoxic T kills it. Think: Class I + CD8 = kill the infected cell."},

  {cat:"Wk5 · MHC & Antigen Presentation", slide:"Slide 14",
   q:"Which cells express MHC Class II to present externally captured antigens?",
   opts:["All nucleated cells in the body","Only APCs: dendritic cells, macrophages, B cells","Only cytotoxic T cells","Only NK cells and neutrophils"],
   ans:1, exp:"MHC Class II is restricted to professional antigen-presenting cells (dendritic cells, macrophages, B cells). It displays fragments of EXTERNALLY captured pathogens to CD4+ helper T cells, which then coordinate the full adaptive response."},

  {cat:"Wk5 · T Cells", slide:"Slides 16, 18",
   q:"Helper T cells (CD4+) are the central coordinators of adaptive immunity because they:",
   opts:["Directly kill infected cells via perforins","Produce antibodies during secondary response","Activate BOTH cytotoxic T cells AND B cells via interleukins","Recognize antigens on MHC Class I only"],
   ans:2, exp:"Without CD4+ helper T cells, neither arm of adaptive immunity functions fully. They receive signals from APCs via MHC Class II and then send activation signals to both cytotoxic T cells (cell-mediated) and B cells (humoral). HIV destroys exactly these cells."},

  {cat:"Wk5 · T Cells", slide:"Slides 16, 18",
   q:"Which immune cells are progressively destroyed in HIV infection?",
   opts:["CD8+ cytotoxic T cells","CD4+ helper T cells","B lymphocytes / plasma cells","NK natural killer cells"],
   ans:1, exp:"HIV infects CD4+ helper T cells (also macrophages and dendritic cells). As CD4+ count drops below 200 cells/μL, the patient meets the AIDS diagnosis threshold. The loss of CD4+ cells collapses BOTH humoral and cell-mediated immunity."},

  {cat:"Wk5 · B Cells & Humoral Immunity", slide:"Slide 19",
   q:"Which cells are the 'antibody factories' responsible for producing immunoglobulins?",
   opts:["Memory B cells","Helper T cells","Plasma cells (differentiated B cells)","Cytotoxic T cells"],
   ans:2, exp:"After clonal selection and activation by helper T cells, most B cell clones differentiate into plasma cells — short-lived antibody factories. A smaller subset becomes long-lived memory B cells for future rapid response."},

  {cat:"Wk5 · B Cells & Humoral Immunity", slide:"Slide 18",
   q:"Which cells destroy virally infected and cancerous cells directly via cytotoxic enzymes?",
   opts:["Plasma B cells","CD8+ cytotoxic T cells","Helper T cells","Regulatory T cells"],
   ans:1, exp:"CD8+ cytotoxic T cells bind cells displaying foreign antigens on MHC Class I and release perforins (punch holes) and granzymes (trigger apoptosis). This is cell-mediated immunity — no antibodies involved."},

  {cat:"Wk5 · Immunoglobulins", slide:"Slide 23",
   q:"Which immunoglobulin is produced FIRST during a primary immune response?",
   opts:["IgA","IgG","IgM","IgE"],
   ans:2, exp:"IgM is the first responder — a pentamer produced within 3–6 days of first antigen exposure. Elevated IgM in a blood test indicates a current or very recent new infection. IgG follows and dominates the secondary response."},

  {cat:"Wk5 · Immunoglobulins", slide:"Slide 23",
   q:"IgG is clinically important in pregnancy because it:",
   opts:["Triggers mast cell degranulation in the fetus","Crosses the placenta to provide passive immunity to the fetus","Is found primarily in breast milk and tears","Is the first antibody produced in a primary response"],
   ans:1, exp:"IgG is the only immunoglobulin that crosses the placenta, providing the fetus with passive immunity against antigens the mother has been exposed to. This protection lasts several months after birth while the infant's own immune system matures."},

  {cat:"Wk5 · Immunoglobulins", slide:"Slide 23",
   q:"Which immunoglobulin is primarily responsible for allergic reactions and anaphylaxis?",
   opts:["IgM","IgG","IgA","IgE"],
   ans:3, exp:"IgE is the allergy antibody. It binds to receptors on mast cells and basophils. When an allergen cross-links IgE on a mast cell, degranulation releases histamine → vasodilation, bronchoconstriction, and the anaphylactic response."},

  {cat:"Wk5 · Immunoglobulins", slide:"Slide 23",
   q:"IgA is concentrated in secretions such as saliva, tears, and breast milk because:",
   opts:["It is the most abundant antibody in blood","It crosses the placenta for fetal protection","It provides mucosal immunity at body surface barriers","It activates the complement classical pathway"],
   ans:2, exp:"IgA (a dimer in secretions) is the guardian of mucosal surfaces — the first internal line against pathogens trying to enter via mucous membranes. Via breast milk it also provides passive mucosal immunity to nursing infants."},

  {cat:"Wk5 · Antibody Functions", slide:"Slides 21–22",
   q:"Which antibody function coats a pathogen to tag it for phagocytosis?",
   opts:["Neutralization","Agglutination","Opsonization","Precipitation"],
   ans:2, exp:"Opsonization = coating the pathogen with antibody (and sometimes complement) so phagocytes can bind the Fc region and engulf the target more efficiently. Think of it as gift-wrapping a pathogen for a macrophage."},

  {cat:"Wk5 · Antibody Functions", slide:"Slides 21–22",
   q:"Which antibody function blocks pathogen surface molecules to prevent host cell entry?",
   opts:["Opsonization","Neutralization","Complement fixation","ADCC"],
   ans:1, exp:"Neutralization is especially important against viruses and toxins — antibodies bind to the surface structures the pathogen uses to attach to host cells, physically blocking entry. Neutralizing antibodies are the goal of many vaccines."},

  {cat:"Wk5 · Hypersensitivity", slide:"Slide 31",
   q:"Type I hypersensitivity (anaphylaxis) is mediated by which immunoglobulin?",
   opts:["IgG","IgM","IgA","IgE"],
   ans:3, exp:"Type I = IgE-mediated. On first allergen exposure, IgE is produced and binds mast cells. On re-exposure, allergen cross-links the IgE → mast cell degranulation → histamine release → vasodilation, bronchoconstriction, systemic reaction. Treat with epinephrine."},

  {cat:"Wk5 · Hypersensitivity", slide:"Slide 31",
   q:"Which hypersensitivity type is T-cell mediated, involves NO antibodies, and occurs 12–72 hours after exposure?",
   opts:["Type I — IgE mediated anaphylaxis","Type II — cytotoxic antibody reaction","Type III — immune complex deposition","Type IV — delayed T-cell mediated"],
   ans:3, exp:"Type IV (delayed hypersensitivity) is the only type without antibodies — it requires T cell recruitment and activation. Classic examples: poison ivy contact dermatitis, TB skin test (PPD), organ transplant rejection. The 12–72 hour delay is the exam clue."},

  {cat:"Wk5 · Immunodeficiency", slide:"Slides 33–34",
   q:"AIDS is diagnosed when CD4+ T cell count drops below:",
   opts:["500 cells/μL","350 cells/μL","200 cells/μL","100 cells/μL"],
   ans:2, exp:"AIDS diagnosis threshold = CD4+ < 200 cells/μL. Normal CD4+ count is 500–1500 cells/μL. Below 200, the immune system is so compromised that opportunistic infections (PCP pneumonia, CMV, Kaposi's sarcoma) develop freely."},

  {cat:"Wk5 · Immunodeficiency", slide:"Slides 33–34",
   q:"SCID differs from AIDS in that SCID:",
   opts:["Is acquired through viral infection over time","Only destroys CD4+ T helper cells","Is a genetic condition present at birth with BOTH B and T cell deficiency","Can be treated with antiretroviral drugs"],
   ans:2, exp:"SCID = Severe Combined ImmunoDeficiency — genetic, present at birth, affects BOTH B and T lymphocytes → complete adaptive immune collapse. Even minor infections are life-threatening. Treatment: bone marrow transplant. Contrast with AIDS: acquired, destroys CD4+ only, over years."},

  {cat:"Wk5 · Active vs. Passive Immunity", slide:"Slides 27–28",
   q:"Which form of immunity provides IMMEDIATE but SHORT-TERM protection with no memory cells?",
   opts:["Active natural immunity — from natural infection","Active artificial immunity — vaccination","Passive immunity — receiving pre-formed antibodies","Cell-mediated immunity via cytotoxic T cells"],
   ans:2, exp:"Passive immunity = receiving pre-formed antibodies from an external source. Immediate protection (antibodies are already there), but short-term (2–3 weeks, no memory cells formed). Examples: antivenom, rabies Ig, IgG across placenta, IgA in breast milk."},

  // ── WEEK 6: RESPIRATORY ANATOMY ──
  {cat:"Wk6 · Conducting vs. Respiratory Zone", slide:"Slides 3, 5",
   q:"The conducting zone is also called anatomical dead space because:",
   opts:["It contains no blood vessels","Air moves through it but no gas exchange occurs (~150 mL)","It is located outside the thoracic cavity","It produces surfactant instead of exchanging gases"],
   ans:1, exp:"The conducting zone (nose → terminal bronchioles) transports, warms, filters, and humidifies air but has no alveoli for gas exchange. Its ~150 mL volume is 'wasted' per breath from a gas-exchange standpoint — this is anatomical dead space."},

  {cat:"Wk6 · Conducting vs. Respiratory Zone", slide:"Slides 3, 5",
   q:"Gas exchange first begins in which structure, marking the start of the respiratory zone?",
   opts:["Terminal bronchioles","Segmental bronchi","Respiratory bronchioles","Primary bronchi"],
   ans:2, exp:"Respiratory bronchioles are the transition — they have scattered alveoli budding from their walls, making them the first site of any gas exchange. Terminal bronchioles immediately proximal to them are still conducting zone only."},

  {cat:"Wk6 · Upper Respiratory Tract", slide:"Slides 7, 9",
   q:"The right main bronchus is more prone to aspiration of foreign bodies than the left because it is:",
   opts:["Longer, narrower, and more horizontal","Wider, shorter, and more vertical","Protected by more cartilage rings","Connected directly to the larynx"],
   ans:1, exp:"Right main bronchus: wider, shorter, more vertical = a more direct path from the trachea. Foreign bodies, aspirated food, and aspiration pneumonia preferentially go right. Clinical pearl: always consider right lower lobe first in aspiration pneumonia."},

  {cat:"Wk6 · Upper Respiratory Tract", slide:"Slides 6–7",
   q:"Which pharyngeal region is lined with pseudostratified ciliated columnar epithelium because it carries air ONLY?",
   opts:["Oropharynx","Laryngopharynx","Nasopharynx","Hypopharynx"],
   ans:2, exp:"Nasopharynx = air only → pseudostratified ciliated columnar epithelium (same as the rest of the respiratory tract). Oropharynx and laryngopharynx carry both air AND food → stratified squamous epithelium (durable, abrasion-resistant). Epithelium type follows function."},

  {cat:"Wk6 · Lower Respiratory Tract", slide:"Slide 9",
   q:"The C-shaped cartilage rings of the trachea are open posteriorly to accommodate:",
   opts:["The larynx sitting directly behind it","The esophagus and trachealis muscle contraction during swallowing","The carina bifurcation","The phrenic nerve pathway"],
   ans:1, exp:"The open posterior gap of each C-ring faces the esophagus. The trachealis muscle bridges this gap. When you swallow, the esophagus expands into this space. During coughing, the trachealis contracts, narrowing the trachea to increase airflow velocity."},

  {cat:"Wk6 · Lung Anatomy", slide:"Slide 11",
   q:"The cardiac notch is a feature of which lung, and what accommodates it?",
   opts:["Right lung — accommodates the liver below","Left lung — accommodates the position of the heart","Both lungs — provides attachment for the pleura","Right lung — accommodates the aortic arch"],
   ans:1, exp:"The left lung has only 2 lobes (no middle lobe) and a cardiac notch on its mediastinal surface — this concave indentation accommodates the heart, which sits left of center. The lingula is the tongue-like tip of the left superior lobe that wraps around the cardiac notch."},

  {cat:"Wk6 · Alveolar Cell Types", slide:"Slide 12",
   q:"Type II alveolar cells prevent alveolar collapse during exhalation by:",
   opts:["Performing gas exchange across the thin squamous membrane","Phagocytizing dust and bacteria in the alveolar lumen","Secreting surfactant which reduces surface tension","Forming tight junctions to seal alveolar walls"],
   ans:2, exp:"Type II cells (great/cuboidal pneumocytes) secrete surfactant — a phospholipid mixture that reduces surface tension inside alveoli. Without surfactant, alveoli collapse on exhalation (like blowing up a balloon that sticks together). NRDS in premature infants = insufficient surfactant."},

  {cat:"Wk6 · Alveolar Cell Types", slide:"Slide 12",
   q:"Which alveolar cell covers ~95% of the alveolar surface and is the actual site of gas exchange?",
   opts:["Type II alveolar cells (great pneumocytes)","Alveolar macrophages (dust cells)","Type I alveolar cells (squamous pneumocytes)","Goblet cells"],
   ans:2, exp:"Type I alveolar cells are extremely thin, flat squamous cells — their minimal thickness (~0.5 µm, thinner than one cell) is what makes rapid gas diffusion possible. They cannot divide; Type II cells regenerate them when damaged."},

  {cat:"Wk6 · Pleural Membranes", slide:"Slide 15",
   q:"Intrapleural pressure is always sub-atmospheric (negative) because:",
   opts:["The diaphragm creates a partial vacuum on contraction","Lungs pull inward while chest wall pulls outward — this tug creates sustained negative pressure","Surfactant reduces pressure inside the alveoli","Pleural fluid absorbs atmospheric pressure"],
   ans:1, exp:"The lung's elastic recoil pulls it inward while the chest wall's recoil pulls it outward. The pleural space is between them — this tension creates a permanent negative pressure (~-4 mmHg at rest) that keeps the lungs inflated against the chest wall."},

  {cat:"Wk6 · Pleural Membranes", slide:"Slide 15",
   q:"A pneumothorax causes lung collapse because:",
   opts:["Blood fills the pleural cavity compressing the heart","Air enters the pleural cavity, eliminating negative intrapleural pressure","Surfactant is destroyed by incoming air","The diaphragm is paralyzed by the pressure change"],
   ans:1, exp:"When air enters the pleural cavity (trauma, spontaneous rupture), the negative intrapleural pressure is lost — the lung's elastic recoil is no longer counterbalanced and the lung collapses. Treatment: needle decompression or chest tube to restore negative pressure."},

  {cat:"Wk6 · Lung Volumes", slide:"Slide 23",
   q:"Vital capacity (VC) is a key clinical metric because it is reduced in:",
   opts:["Obstructive disease only — air trapping reduces VC from below","Restrictive disease only — stiff lungs reduce VC from above","Both restrictive AND obstructive disease, though by different mechanisms","Neither — VC is only reduced in neuromuscular disease"],
   ans:2, exp:"In restrictive disease: stiff lungs can't expand → all volumes shrink → VC decreases. In obstructive disease: air trapping raises RV → less room for VC → VC decreases from the bottom up. The mechanism differs but VC falls in both. It's the most clinically monitored spirometry value."},

  {cat:"Wk6 · Lung Volumes", slide:"Slide 23",
   q:"TLC increases in emphysema because:",
   opts:["Surfactant production increases to compensate","Alveolar wall destruction reduces elastic recoil — air traps and RV rises","The diaphragm flattens permanently from chronic hyperinflation","All lung volumes increase proportionally"],
   ans:1, exp:"Emphysema destroys alveolar walls, eliminating the elastic tissue. Without elastic recoil, air traps — RV and FRC rise. The chest barrel-shapes. TLC increases because more air is permanently trapped. On spirometry, the floor of the graph rises significantly."},

  {cat:"Wk6 · Respiratory Structure Functions", slide:"Slide 17",
   q:"Which respiratory structure is primarily responsible for phonation (sound production)?",
   opts:["Trachea","Epiglottis","Larynx","Pharynx"],
   ans:2, exp:"The larynx contains the true vocal cords — vibration of these structures produces sound. The arytenoid cartilages control pitch. The thyroid cartilage (Adam's apple) protects the cords. Testosterone-driven growth of the thyroid cartilage explains voice deepening in males at puberty."},

  {cat:"Wk6 · Respiratory System Functions", slide:"Slide 17",
   q:"Which respiratory system function involves converting angiotensin I to angiotensin II?",
   opts:["Gas exchange at the alveoli","Blood pressure regulation — pulmonary endothelium contains ACE","Filtration of small emboli from venous blood","Platelet production in lung capillaries"],
   ans:1, exp:"The pulmonary capillary endothelium contains angiotensin-converting enzyme (ACE), which converts angiotensin I → angiotensin II → vasoconstriction + aldosterone release → elevated blood pressure. This is why ACE inhibitors are used to treat hypertension."},

  // ── WEEK 7: RESPIRATORY PHYSIOLOGY ──
  {cat:"Wk7 · Muscles of Respiration", slide:"W7 Slide 6",

let current=0, score=0, answered=false, shuffled=[];
const cats={};

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function init(){
  shuffled=shuffle([...questions]);
  current=0; score=0;
  Object.keys(cats).forEach(k=>delete cats[k]);
  document.getElementById('quizScreen').style.display='';
  document.getElementById('resultsScreen').style.display='none';
  loadQuestion();
}

function loadQuestion(){
  answered=false;
  const q=shuffled[current];
  document.getElementById('questionCounter').textContent=`Question ${current+1} of ${shuffled.length}`;
  document.getElementById('scoreBadge').textContent=`Score: ${score}`;
  document.getElementById('progressBar').style.width=`${(current/shuffled.length)*100}%`;
  document.getElementById('categoryTag').textContent=q.cat;
  document.getElementById('slideRef').textContent=q.slide;
  document.getElementById('questionText').innerHTML=q.q;

  const container=document.getElementById('optionsContainer');
  container.innerHTML='';
  ['A','B','C','D'].forEach((letter,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.innerHTML=`<span class="letter">${letter}</span><span>${q.opts[i]}</span>`;
    btn.onclick=()=>selectAnswer(i,q.ans,q.exp,q.cat);
    container.appendChild(btn);
  });

  document.getElementById('feedbackBox').style.display='none';
  document.getElementById('feedbackBox').className='feedback';
  document.getElementById('btnNext').style.display='none';
}

function selectAnswer(chosen,correct,explanation,cat){
  if(answered)return;
  answered=true;
  const btns=document.querySelectorAll('.option-btn');
  btns.forEach(b=>b.disabled=true);
  if(!cats[cat])cats[cat]={right:0,total:0};
  cats[cat].total++;

  const fb=document.getElementById('feedbackBox');
  fb.style.display='block';

  if(chosen===correct){
    score++;
    cats[cat].right++;
    btns[chosen].classList.add('correct');
    fb.className='feedback correct';
    document.getElementById('feedbackLabel').textContent='✓ Correct!';
  } else {
    btns[chosen].classList.add('wrong');
    btns[correct].classList.add('revealed');
    fb.className='feedback wrong';
    document.getElementById('feedbackLabel').textContent=`✗ Incorrect — correct answer: ${['A','B','C','D'][correct]}`;
  }
  document.getElementById('feedbackText').innerHTML=explanation;
  document.getElementById('scoreBadge').textContent=`Score: ${score}`;
  document.getElementById('btnNext').style.display='block';
}

function nextQuestion(){
  current++;
  if(current>=shuffled.length)showResults();
  else loadQuestion();
}

function showResults(){
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('quizScreen').style.display='none';
  const rs=document.getElementById('resultsScreen');
  rs.style.display='block';
  const pct=Math.round((score/shuffled.length)*100);
  document.getElementById('finalScore').textContent=`${score}/${shuffled.length}`;
  let grade,heading,sub;
  if(pct>=90){grade='A';heading='Exam ready!';sub='Outstanding command of all three weeks. You are ready for Exam 3.';}
  else if(pct>=80){grade='B';heading='Great work!';sub='Strong performance — review the topics you missed and you\'ll be set.';}
  else if(pct>=70){grade='C';heading='Good effort.';sub='Read through the feedback explanations for missed questions before the exam.';}
  else{grade='D/F';heading='Keep studying!';sub='Focus on your lowest-scoring categories below and retry.';}
  document.getElementById('gradeBadge').textContent=`${pct}% — ${grade}`;
  document.getElementById('resultsHeading').textContent=heading;
  document.getElementById('resultsSubtext').textContent=sub;

  let html='<h3>Performance by Topic</h3>';
  Object.entries(cats).forEach(([cat,data])=>{
    const p=Math.round((data.right/data.total)*100);
    const color=p>=80?'#2E7D32':p>=60?'#E65100':'#C62828';
    html+=`<div class="cat-row"><span>${cat}</span><span style="font-weight:600;color:${color}">${data.right}/${data.total} (${p}%)</span></div>`;
  });
  document.getElementById('breakdownBox').innerHTML=html;
}

function restartQuiz(){init();}
init();
</script>
